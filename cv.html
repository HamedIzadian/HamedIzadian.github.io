      <h2>Curriculum Vitae</h2>
      <!-- Embed the CV PDF for viewing -->
      <div id="adobe-dc-view" style="width: 100%; height: 600px;"></div>

      <script>
        document.addEventListener("adobe_dc_view_sdk.ready", function () {
          const adobeDCView = new AdobeDC.View({ 
            clientId: "9188dedf28084954849a33764618f422", // Replace with your Adobe API key
            divId: "adobe-dc-view"
          });

          adobeDCView.previewFile({
            content: { 
              location: { url: "assets/files/CV.pdf" }  // Path to your CV
            },
            metaData: { fileName: "CV.pdf" }
          }, {});
        });
    </script>


      <!-- Custom Download Icon -->
      <p style="text-align: center; margin-top: 15px;">
        <a href="assets/files/CV.pdf" download style="display: inline-flex; align-items: center; text-decoration: none; font-size: 1.1em;">
          <img src="assets/images/icons/download-347-512.png" alt="Download Icon" width="24" height="24" style="margin-right: 8px;">
          <span>Download CV</span>
        </a>
      </p>
