<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Hamed Izadian</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Hamed Izadian</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="cv.html">CV</a>
      <a href="projects.html">Projects</a>
      <a href="research.html">Research</a>
      <a href="blog.html">Blog</a>
      <button id="theme-toggle">Toggle Theme</button>
    </nav>
  </header>

  <main>
    <section class="projects-section">
      <h2>Projects</h2>
      <div class="project-card" data-title="Project One" data-description="Description of project one.">
        <h3>Project One</h3>
        <p>Click for details.</p>
      </div>
      <div class="project-card" data-title="Project Two" data-description="Description of project two.">
        <h3>Project Two</h3>
        <p>Click for details.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Hamed Izadian</p>
  </footer>

  <!-- Modal for Project Details -->
  <div class="modal" id="project-modal">
    <div class="modal-content">
      <span class="modal-close" id="modal-close">&times;</span>
      <h4 id="modal-title"></h4>
      <p id="modal-description"></p>
    </div>
  </div>

  <script>
    // Theme Toggle Functionality
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });
    
    // Project Modal Functionality
    const projectCards = document.querySelectorAll('.project-card');
    const modal = document.getElementById('project-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalDescription = document.getElementById('modal-description');
    const modalClose = document.getElementById('modal-close');

    projectCards.forEach(card => {
      card.addEventListener('click', () => {
        modalTitle.textContent = card.getAttribute('data-title');
        modalDescription.textContent = card.getAttribute('data-description');
        modal.classList.add('active');
      });
    });

    modalClose.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    modal.addEventListener('click', (e) => {
      if(e.target === modal) {
        modal.classList.remove('active');
      }
    });
  </script>
</body>
</html>
